<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuestIs?</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "nipplejs": "https://esm.sh/nipplejs@0.10.1"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="quest-info">
                <span id="quest-text">Quest: Find the Stairs!</span>
                <span id="level-text">Floor: 1</span>
            </div>
            <div id="stats-bar">
                <div class="stat">HP: <span id="hp-val">10</span>/<span id="max-hp-val">10</span></div>
                <div class="stat">Lvl: <span id="lvl-val">1</span></div>
                <div class="stat">XP: <span id="xp-val">0</span>/<span id="xp-req-val">10</span></div>
                <div class="stat">Gold: <span id="gold-val">0</span></div>
            </div>
            <div id="message-log"></div>
            
            <div id="class-selection-screen">
                <h2>Choose Your Hero</h2>
                <div class="class-cards">
                    <div class="class-card" data-class="warrior">
                        <h3>Warrior</h3>
                        <p>High HP, Reliable Damage</p>
                    </div>
                    <div class="class-card" data-class="mage">
                        <h3>Mage</h3>
                        <p>Low HP, High Damage</p>
                    </div>
                    <div class="class-card" data-class="archer">
                        <h3>Archer</h3>
                        <p>Balanced, Crit Chance</p>
                    </div>
                </div>
            </div>

            <div id="shop-ui" style="display: none;">
                <h2>Dungeon Shop</h2>
                <div id="shop-gold">Gold: 0</div>
                <div class="shop-items">
                    <div class="shop-item" onclick="window.buyItem('potion')">
                        <div class="icon">❤️</div>
                        <div>Heal Potion</div>
                        <div class="cost">50g</div>
                    </div>
                    <div class="shop-item" onclick="window.buyItem('upgrade')">
                        <div class="icon">⚔️</div>
                        <div>Weapon Up</div>
                        <div class="cost">100g</div>
                    </div>
                    <div class="shop-item" onclick="window.buyItem('maxhp')">
                        <div class="icon">🛡️</div>
                        <div>Max HP Up</div>
                        <div class="cost">100g</div>
                    </div>
                </div>
                <button id="close-shop-btn">Leave</button>
            </div>
        </div>
        <div id="mobile-controls-zone"></div>
        <button id="interact-btn">ACTION</button>
    </div>
    <script type="module" src="src/main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
